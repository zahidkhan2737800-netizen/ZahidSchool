<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Zahid School - Admin Dashboard</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="dashboard new.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="mobile-header">
    <button class="hamburger" id="menuToggle"><i class="fas fa-bars"></i></button>
    <span class="mob-title">Zahid School</span>
  </div>
  <div class="overlay-bg" id="overlayBg"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
      <div class="brand-text">
        <h2>Zahid System</h2>
        <p>School Management</p>
      </div>
    </div>

    <div class="sidebar-user" id="sidebarUser">
      <div class="user-avatar" id="userAvatar">??</div>
      <div class="user-details">
        <div class="user-name" id="userName">Loading...</div>
        <div class="user-role" id="userRole">--</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav"></nav>

    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </div>
  </aside>

  <main class="main">
    <div class="welcome-card">
      <h1 id="welcomeMsg">Welcome back!</h1>
      <p>Manage Zahid School from one place. Select a section from the sidebar to get started.</p>
      <div class="welcome-date" id="welcomeDate"></div>
    </div>

    <div class="quote-card" id="quoteCard" style="display:none;">
      <i class="fas fa-quote-left quote-icon"></i>
      <p class="quote-text" id="quoteText"></p>
      <span class="quote-author" id="quoteAuthor"></span>
    </div>

    <div class="stats" id="statsGrid">
      <div class="stat-card">
        <div class="stat-icon blue"><i class="fas fa-users"></i></div>
        <div class="stat-info"><div class="stat-val" id="statActiveStudents">--</div><div class="stat-label">Active Students</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i class="fas fa-money-check-alt"></i></div>
        <div class="stat-info"><div class="stat-val" id="statFeesCollected">--</div><div class="stat-label">Fees Collected (Month)</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><i class="fas fa-user-minus"></i></div>
        <div class="stat-info"><div class="stat-val" id="statWithdrawn">--</div><div class="stat-label">Withdrawn (Month)</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple"><i class="fas fa-receipt"></i></div>
        <div class="stat-info"><div class="stat-val" id="statChallans">--</div><div class="stat-label">Challans Generated (Month)</div></div>
      </div>
    </div>

    <div class="section-title">Quick Access</div>
    <div class="quick-links" id="quickLinks"></div>
  </main>

  <script src="auth.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
