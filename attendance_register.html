<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Register - Zahid School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d7deea;
      --text: #10233e;
      --muted: #53637c;
      --accent: #1656cc;
      --accent-soft: #dbeafe;
      --w-roll: 78px;
      --w-name: 220px;
      --w-father: 220px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
    }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
      margin-bottom: 12px;
    }

    .head h1 {
      margin: 0;
      font-size: 1.35rem;
      color: #0f2f66;
    }

    .head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .head a {
      text-decoration: none;
      color: var(--accent);
      font-weight: 700;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr 0.8fr 1fr auto;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
    }

    select, input, button {
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid #b7c7df;
      padding: 8px 10px;
      font: inherit;
      font-size: 16px;
      color: var(--text);
      background: #fff;
    }

    button {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(0.95);
    }

    .meta {
      margin: 0 2px 10px;
      color: #24456f;
      font-size: 0.98rem;
      font-weight: 600;
      min-height: 18px;
    }

    .table-box {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: auto;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
      max-height: calc(100vh - 210px);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1300px;
      font-size: 15px;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #1d4fa8;
      z-index: 2;
      font-weight: 700;
      color: #ffffff;
      border-bottom: 1px solid #19438f;
    }

    th, td {
      border-right: 1px solid #e1e8f2;
      border-bottom: 1px solid #e1e8f2;
      text-align: center;
      white-space: nowrap;
      padding: 8px 8px;
    }

    tbody tr:nth-child(even) td {
      background: #f7faff;
    }

    .sticky {
      position: sticky;
      left: 0;
      z-index: 4;
      background: #fcfdff;
      text-align: left;
      box-shadow: 1px 0 0 #dbe6f5;
    }

    thead .sticky { z-index: 7; background: #1b4b9d; }

    .sticky-2 {
      position: sticky;
      left: var(--w-roll);
      z-index: 3;
      background: #fcfdff;
      text-align: left;
      min-width: var(--w-name);
      max-width: var(--w-name);
      width: var(--w-name);
      box-shadow: 1px 0 0 #dbe6f5;
    }

    thead .sticky-2 { z-index: 6; background: #1b4b9d; }

    .sticky-3 {
      position: sticky;
      left: calc(var(--w-roll) + var(--w-name));
      z-index: 2;
      background: #fcfdff;
      text-align: left;
      min-width: var(--w-father);
      max-width: var(--w-father);
      width: var(--w-father);
      box-shadow: 2px 0 0 #c9d9ef;
    }

    thead .sticky-3 { z-index: 5; background: #1b4b9d; }

    .roll-col {
      min-width: var(--w-roll);
      width: var(--w-roll);
      font-weight: 700;
    }

    .status-pill {
      display: inline-block;
      min-width: 24px;
      border-radius: 999px;
      padding: 3px 0;
      font-weight: 700;
      border: 1px solid #d3e1f5;
      background: #f8fbff;
      color: #475569;
    }

    .s-P { background: #dcfce7; color: #166534; border-color: #86efac; }
    .s-A { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
    .s-H { background: #dbeafe; color: #1e3a8a; border-color: #93c5fd; }
    .s-L { background: #fef3c7; color: #92400e; border-color: #fcd34d; }

    .att-dd {
      width: 48px;
      min-height: 28px;
      height: 28px;
      border-radius: 999px;
      padding: 1px 6px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      border: 1px solid #b8c8df;
      background: #f8fbff;
      color: #334155;
      outline: none;
    }

    .att-dd:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    .att-dd.tone-p { background: #dcfce7; color: #166534; border-color: #86efac; }
    .att-dd.tone-a { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
    .att-dd.tone-h { background: #dbeafe; color: #1e3a8a; border-color: #93c5fd; }
    .att-dd.tone-l { background: #fef3c7; color: #92400e; border-color: #fcd34d; }

    @media (max-width: 980px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1>Attendance Register</h1>
        <p>Class-wise monthly register with daily status (P, A, H, L).</p>
      </div>
      <a href="dashboard.html">Back to Dashboard</a>
    </div>

    <div class="toolbar">
      <select id="classSelect" aria-label="Class"></select>
      <select id="monthSelect" aria-label="Month"></select>
      <select id="yearSelect" aria-label="Year"></select>
      <input id="searchInput" type="text" placeholder="Search roll/name/father">
      <button id="loadBtn" type="button">Load Register</button>
    </div>

    <div id="meta" class="meta">Loading...</div>

    <div class="table-box">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="attendance_register.js"></script>
</body>
</html>
