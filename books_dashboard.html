<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books Dashboard - Zahid School</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f9; margin:20px; color:#222; }
    .wrap { max-width:1200px; margin:0 auto; }
    h1 { text-align:center; color: #1e293b; margin-bottom: 24px; }
    
    .header-nav { display:flex; justify-content:flex-end; gap:15px; margin-bottom:15px; }
    .header-nav a { text-decoration:none; color:#007bff; font-weight:600; }
    .header-nav a:hover { text-decoration:underline; }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.2s ease;
    }
    
    .stat-card:hover {
      transform: translateY(-4px);
    }

    .stat-icon {
      font-size: 2rem;
      margin-bottom: 12px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-blue { background: #eff6ff; color: #3b82f6; }
    .icon-green { background: #f0fdf4; color: #22c55e; }
    .icon-purple { background: #faf5ff; color: #a855f7; }
    .icon-orange { background: #fff7ed; color: #f97316; }
    .icon-red { background: #fef2f2; color: #ef4444; }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.95rem;
      font-weight: 500;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .quick-links {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 40px;
    }
    
    .btn {
      padding: 12px 24px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }
    
    .btn:hover { background: #0056b3; }
    .btn-secondary { background: #64748b; }
    .btn-secondary:hover { background: #475569; }

  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="wrap">
    <div class="header-nav">
      <a href="dashboard.html">← Back to Dashboard</a>
    </div>
    
    <h1><i class="fas fa-chart-pie"></i> Books Inventory Dashboard</h1>

    <div class="dashboard-grid" id="statsGrid">
      
      <div class="stat-card">
        <div class="stat-icon icon-blue">
          <i class="fas fa-boxes"></i>
        </div>
        <div class="stat-value" id="valTotalBooks"><div class="loader"></div></div>
        <div id="qtyTotalBooks" style="color:#64748b; font-size:13px; margin-bottom:6px; font-weight:600;">...</div>
        <div class="stat-label">Total Inventory Value</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon icon-green">
          <i class="fas fa-shopping-cart"></i>
        </div>
        <div class="stat-value" id="valSoldToday"><div class="loader"></div></div>
        <div id="qtySoldToday" style="color:#64748b; font-size:13px; margin-bottom:6px; font-weight:600;">...</div>
        <div class="stat-label">Sales Revenue Today</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon icon-purple">
          <i class="fas fa-calendar-check"></i>
        </div>
        <div class="stat-value" id="valSoldMonth"><div class="loader"></div></div>
        <div id="qtySoldMonth" style="color:#64748b; font-size:13px; margin-bottom:6px; font-weight:600;">...</div>
        <div class="stat-label">Sales Revenue This Month</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon icon-orange">
          <i class="fas fa-plus-circle"></i>
        </div>
        <div class="stat-value" id="valAddedToday"><div class="loader"></div></div>
        <div id="qtyAddedToday" style="color:#64748b; font-size:13px; margin-bottom:6px; font-weight:600;">...</div>
        <div class="stat-label">Investment Today</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon icon-red">
          <i class="fas fa-layer-group"></i>
        </div>
        <div class="stat-value" id="valAddedMonth"><div class="loader"></div></div>
        <div id="qtyAddedMonth" style="color:#64748b; font-size:13px; margin-bottom:6px; font-weight:600;">...</div>
        <div class="stat-label">Investment This Month</div>
      </div>

    </div>

    <div class="quick-links">
      <a href="books_inventory.html" class="btn"><i class="fas fa-box-open"></i> Go to Inventory</a>
      <a href="book_sales_report.html" class="btn btn-secondary"><i class="fas fa-file-invoice-dollar"></i> View Sales Report</a>
    </div>
    
  </div>

  <script src="auth.js"></script>
  <script src="books_dashboard.js"></script>
</body>
</html>
