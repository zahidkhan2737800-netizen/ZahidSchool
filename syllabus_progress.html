<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syllabus Progress - Zahid School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #dbe4f0;
      --text: #14223a;
      --muted: #5a6d8a;
      --brand: #0f766e;
      --brand-2: #0b5f58;
      --warn: #dc2626;
      --pill: #ecfeff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(15, 118, 110, 0.1) 0, rgba(15, 118, 110, 0) 35%),
        radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.12) 0, rgba(14, 165, 233, 0) 35%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 16px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .top-left {
      flex: 1;
      min-width: 300px;
    }

    .top-right {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      min-width: 280px;
    }

    .session-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .session-group label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .session-group select {
      min-width: 160px;
      min-height: 36px;
    }

    .title h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .top a {
      text-decoration: none;
      color: var(--brand);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06);
      padding: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: auto auto auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .btn-danger {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .btn-danger.active {
      background: #dc2626;
      color: #fff;
      border-color: #dc2626;
    }

    .class-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 6px;
      margin-bottom: 8px;
    }

    .class-btn {
      border: 1px solid #b9d7d3;
      background: #f0fdfa;
      color: #0f4f49;
      border-radius: 999px;
      min-height: 34px;
      padding: 6px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      transition: all 120ms ease;
    }

    .class-btn.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      box-shadow: 0 5px 14px rgba(15, 118, 110, 0.2);
    }

    select,
    input,
    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      font-size: 0.9rem;
      background: #fff;
      color: var(--text);
      min-height: 40px;
    }

    input::placeholder { color: #89a; }

    button {
      cursor: pointer;
      font-weight: 600;
      transition: transform 120ms ease, background-color 120ms ease;
    }

    button:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    .btn-primary:hover { background: var(--brand-2); }

    .btn-soft { background: var(--pill); color: #0c4a6e; }

    .status {
      margin: 6px 2px 10px;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 18px;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: auto;
      max-height: calc(100vh - 270px);
      background: #fff;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    th,
    td {
      border-bottom: 1px solid #e8eff7;
      border-right: 1px solid #eef3f9;
      padding: 0;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f8fbff;
      text-align: left;
      font-size: 0.92rem;
      color: #0f3a53;
      font-weight: 700;
      white-space: nowrap;
    }

    th > div {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 7px 8px;
    }

    .th-label {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .th-name-edit {
      padding: 2px 5px;
      border-radius: 6px;
      outline: none;
      min-width: 0;
      max-width: 100%;
      border: 1px dashed transparent;
      display: inline-block;
    }

    .th-name-edit:focus {
      border-color: #8ac5bf;
      background: #ecfeff;
    }

    .delete-armed {
      cursor: pointer;
      user-select: none;
    }

    tbody tr.delete-armed:hover td {
      background: #fee2e2 !important;
    }

    .th-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .mini-btn {
      border: 1px solid #c8d8eb;
      background: #fff;
      color: #385678;
      border-radius: 8px;
      padding: 2px 8px;
      min-height: auto;
      font-size: 0.76rem;
      line-height: 1.2;
    }

    .danger { color: var(--warn); border-color: #f3b4b4; }

    td > div[contenteditable="true"] {
      min-height: 31px;
      padding: 4px 6px;
      outline: none;
      font-size: 1.18rem;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    td > div[contenteditable="true"]:focus {
      background: #ecfeff;
      box-shadow: inset 0 0 0 2px rgba(15, 118, 110, 0.18);
    }

    .col-sticky {
      position: sticky;
      left: 0;
      z-index: 1;
      background: #fcfefe;
      min-width: 94px;
    }

    th.col-sticky { z-index: 3; background: #f1fbfa; }

    .hint {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hint span {
      padding: 3px 8px;
      border-radius: 99px;
      border: 1px solid #d6e5f4;
      background: #f8fbff;
    }

    @media (max-width: 980px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .controls button {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="top-left">
        <div class="title">
          <h1>Syllabus / Course Progress Tracker</h1>
          <p>Select class, add rows and columns, and track topic coverage in a compact grid.</p>
        </div>
      </div>
      <div class="top-right">
        <div class="session-group">
          <label for="sessionInput">Academic Session</label>
          <select id="sessionInput">
            <option value="">Loading sessions...</option>
          </select>
        </div>
        <a href="dashboard.html">Back to Dashboard</a>
      </div>
    </header>

    <section class="panel">
      <div class="controls">
        <button id="addColBtn" class="btn-soft" type="button">+ Add Column</button>
        <button id="addRowBtn" class="btn-soft" type="button">+ Add Row</button>
        <button id="deleteModeBtn" class="btn-danger" type="button">Delete</button>
      </div>

      <div id="classButtons" class="class-strip"></div>

      <div class="controls" style="grid-template-columns: 1fr; margin-top: 0; gap: 12px;">
        <select id="classSelect" style="display:none;">
          <option value="">Select class...</option>
        </select>
        <input id="activeClassLabel" type="text" readonly value="No class selected" style="background:#f8fafc; color:#0f172a; font-weight:700;">
      </div>

      <div class="status" id="statusText">Loading classes...</div>

      <div class="table-wrap">
        <table id="progressTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="hint">
        <span>Tip: Click any cell to type</span>
        <span>Tip: Use + Add Column for custom fields</span>
        <span>Tip: Data is saved class-wise in your browser</span>
      </div>
    </section>
  </div>

  <script src="auth.js"></script>
  <script src="syllabus_progress.js"></script>
</body>
</html>
