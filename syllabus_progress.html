<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syllabus Progress - Zahid School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #dbe4f0;
      --text: #14223a;
      --muted: #5a6d8a;
      --brand: #0f766e;
      --brand-2: #0b5f58;
      --warn: #dc2626;
      --pill: #ecfeff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(15, 118, 110, 0.1) 0, rgba(15, 118, 110, 0) 35%),
        radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.12) 0, rgba(14, 165, 233, 0) 35%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 16px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 12px;
    }

    .title h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .top a {
      text-decoration: none;
      color: var(--brand);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06);
      padding: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    select,
    input,
    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      font-size: 0.9rem;
      background: #fff;
      color: var(--text);
      min-height: 40px;
    }

    input::placeholder { color: #89a; }

    button {
      cursor: pointer;
      font-weight: 600;
      transition: transform 120ms ease, background-color 120ms ease;
    }

    button:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    .btn-primary:hover { background: var(--brand-2); }

    .btn-soft { background: var(--pill); color: #0c4a6e; }

    .status {
      margin: 6px 2px 10px;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 18px;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: auto;
      max-height: calc(100vh - 270px);
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 1000px;
      border-collapse: separate;
      border-spacing: 0;
    }

    th,
    td {
      border-bottom: 1px solid #e8eff7;
      border-right: 1px solid #eef3f9;
      padding: 0;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f8fbff;
      text-align: left;
      font-size: 0.82rem;
      color: #0f3a53;
      font-weight: 700;
      white-space: nowrap;
    }

    th > div {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 9px 10px;
    }

    .th-label {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .th-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .mini-btn {
      border: 1px solid #c8d8eb;
      background: #fff;
      color: #385678;
      border-radius: 8px;
      padding: 2px 8px;
      min-height: auto;
      font-size: 0.76rem;
      line-height: 1.2;
    }

    .danger { color: var(--warn); border-color: #f3b4b4; }

    td > div[contenteditable="true"] {
      min-height: 38px;
      padding: 8px 10px;
      outline: none;
      font-size: 0.86rem;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }

    td > div[contenteditable="true"]:focus {
      background: #ecfeff;
      box-shadow: inset 0 0 0 2px rgba(15, 118, 110, 0.18);
    }

    .col-sticky {
      position: sticky;
      left: 0;
      z-index: 1;
      background: #fcfefe;
      min-width: 190px;
      max-width: 230px;
      width: 220px;
    }

    th.col-sticky { z-index: 3; background: #f1fbfa; }

    .hint {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hint span {
      padding: 3px 8px;
      border-radius: 99px;
      border: 1px solid #d6e5f4;
      background: #f8fbff;
    }

    @media (max-width: 980px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .controls button {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="title">
        <h1>Syllabus / Course Progress Tracker</h1>
        <p>Select class, add rows and columns, and track topic coverage in a compact grid.</p>
      </div>
      <a href="dashboard.html">Back to Dashboard</a>
    </header>

    <section class="panel">
      <div class="controls">
        <select id="classSelect">
          <option value="">Select class...</option>
        </select>
        <input id="newColName" type="text" placeholder="New field e.g. Reading, Writing, Dictation">
        <button id="addColBtn" class="btn-soft" type="button">+ Add Column</button>
        <button id="addRowBtn" class="btn-soft" type="button">+ Add Row</button>
        <button id="saveBtn" class="btn-primary" type="button">Save</button>
      </div>

      <div class="status" id="statusText">Loading classes...</div>

      <div class="table-wrap">
        <table id="progressTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="hint">
        <span>Tip: Click any cell to type</span>
        <span>Tip: Use + Add Column for custom fields</span>
        <span>Tip: Data is saved class-wise in your browser</span>
      </div>
    </section>
  </div>

  <script src="auth.js"></script>
  <script src="syllabus_progress.js"></script>
</body>
</html>
