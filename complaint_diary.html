<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Diary - Zahid School System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="complaint_diary.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="page-container" style="max-width: 1400px; margin: 0 auto;">
        <!-- Header -->
        <div class="header">
            <div>
                <h1 style="margin:0; color:#0f172a; font-size:2rem; font-weight:800;">📋 Complaint Diary</h1>
                <p style="margin:0.5rem 0 0 0; color:#64748b;">Manage student complaints, track status, and generate reports.</p>
            </div>
            <div class="header-nav">
                <a href="homework.html">📝 Homework</a>
                <a href="dashboard.html">📊 Dashboard</a>
                <button class="btn btn-secondary btn-sm" id="toggleDarkMode">🌙 Dark Mode</button>
            </div>
        </div>

        <!-- Complaint Form -->
        <div class="section-card">
            <h3>➕ Add / Edit Complaint</h3>
            <form id="complaintForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Roll Number</label>
                        <input type="text" id="roll" required placeholder="Enter roll #">
                    </div>
                    <div class="form-group">
                        <label>Student Name</label>
                        <input type="text" id="name" required placeholder="Auto-fills from roll">
                    </div>
                    <div class="form-group">
                        <label>Class</label>
                        <input type="text" id="className" required placeholder="e.g. One A">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option>Homework</option>
                            <option>Fee</option>
                            <option>Fair Copy</option>
                            <option>Book(s)</option>
                            <option>Copies</option>
                            <option>Late Coming</option>
                            <option>Dressing Code</option>
                            <option>Attendance</option>
                            <option>No Response</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Call Status</label>
                        <select id="status" required>
                            <option value="">Select Status</option>
                            <option>Pending</option>
                            <option>Resolved</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Contact with Parents</label>
                        <select id="contactStatus">
                            <option value="">Select Contact</option>
                            <option>Whatsapp</option>
                            <option>Call Received</option>
                            <option>Call Not Received</option>
                            <option>Number Off</option>
                            <option>No Number</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-top:1rem;">
                    <label>Complaint</label>
                    <textarea id="complaint" required rows="2" placeholder="Describe the complaint..."></textarea>
                </div>
                <input type="hidden" id="editId">
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Add Complaint</button>
                    <button type="button" class="btn btn-secondary" id="cancelEdit" style="display:none;">Cancel Edit</button>
                </div>
            </form>
        </div>

        <!-- Search & Filter -->
        <div class="section-card">
            <h3>🔍 Search & Filter</h3>
            <div class="search-grid">
                <div class="form-group">
                    <label>Name / Roll / Class</label>
                    <input type="text" id="searchBox" placeholder="Type to search...">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="searchDate">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="searchCategory">
                        <option value="">All</option>
                        <option>Homework</option><option>Fee</option><option>Fair Copy</option>
                        <option>Book(s)</option><option>Copies</option><option>Late Coming</option>
                        <option>Dressing Code</option><option>Attendance</option><option>No Response</option><option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="searchStatus">
                        <option value="">All</option>
                        <option>Pending</option><option>Resolved</option>
                    </select>
                </div>
                <div class="form-group" style="display:flex; gap:0.5rem; align-items:end;">
                    <button class="btn btn-secondary btn-sm" id="refreshBtn">🔄 Refresh</button>
                    <button class="btn btn-success btn-sm" id="exportCSV">📥 CSV</button>
                </div>
            </div>
        </div>

        <!-- Complaints Table -->
        <div class="section-card">
            <div id="complaintsTableContainer">
                <p style="color:#94a3b8; text-align:center;">Loading complaints...</p>
            </div>
        </div>

        <!-- Reports -->
        <div class="section-card">
            <h3>📊 Reports</h3>
            <div class="search-grid">
                <div class="form-group">
                    <label>Student Roll or Name</label>
                    <input type="text" id="reportStudent" placeholder="Enter roll or name">
                </div>
                <div class="form-group">
                    <label>Filter by Class</label>
                    <input type="text" id="reportClass" placeholder="Optional class filter">
                </div>
                <div class="form-group" style="display:flex; gap:0.5rem; align-items:end;">
                    <button class="btn btn-primary btn-sm" id="genStudentReport">Generate</button>
                    <button class="btn btn-secondary btn-sm" id="printStudentReport">🖨️ Print</button>
                </div>
            </div>
            <div class="report-output" id="specificReport"></div>
        </div>

        <!-- Analytics -->
        <div class="section-card">
            <h3>📈 Analytics</h3>
            <div class="chart-wrap">
                <canvas id="chartCanvas"></canvas>
            </div>
        </div>

        <!-- Backup / Restore -->
        <div class="section-card">
            <h3>💾 Backup & Restore</h3>
            <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap;">
                <button class="btn btn-warning btn-sm" id="backupDataBtn">📦 Backup JSON</button>
                <label class="btn btn-outline btn-sm" style="cursor:pointer;">
                    📂 Restore JSON
                    <input type="file" id="restoreFile" accept=".json" style="display:none;">
                </label>
            </div>
        </div>
    </div>

    <div class="toast-box" id="toastContainer"></div>

    <script src="auth.js"></script>
    <script src="complaint_diary.js"></script>
</body>
</html>
