<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ceritficates - Attendance Appreciation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #eef3f9;
      --card: #ffffff;
      --line: #dbe4f0;
      --text: #1a2a42;
      --muted: #60708b;
      --brand: #0f766e;
      --brand2: #0b5f58;
      --ink: #0f172a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(15, 118, 110, 0.12), transparent 30%),
        radial-gradient(circle at 100% 100%, rgba(2, 132, 199, 0.10), transparent 35%),
        var(--bg);
      min-height: 100vh;
      padding: 16px;
    }

    .wrap { max-width: 1280px; margin: 0 auto; }

    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      margin-bottom: 12px;
    }
    .head h1 { margin: 0; font-size: 1.2rem; }
    .head p { margin: 4px 0 0; color: var(--muted); font-size: 0.88rem; }
    .head a { color: var(--brand); text-decoration: none; font-weight: 700; }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      margin-bottom: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: 180px 240px 1fr auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 700;
    }

    input, select, textarea, button {
      width: 100%;
      border: 1px solid #c8d4e5;
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    textarea { min-height: 82px; resize: vertical; }

    button {
      width: auto;
      cursor: pointer;
      font-weight: 700;
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
      padding: 10px 14px;
    }

    button:hover { background: var(--brand2); }

    .status {
      margin-top: 10px;
      min-height: 18px;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .print-sheet {
      width: 210mm;
      height: 297mm;
      background: #fff;
      margin: 0 auto 10px;
      padding: 6mm;
      box-shadow: 0 0 14px rgba(0, 0, 0, 0.12);
      page-break-after: always;
      display: flex;
      flex-direction: column;
      gap: 4mm;
    }

    .certificate {
      flex: 1;
      min-height: 0;
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 8mm 8mm;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #f8fbff 0%, #ffffff 48%, #f8fbff 100%);
    }

    .certificate:before,
    .certificate:after {
      content: "";
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: rgba(15, 118, 110, 0.08);
      z-index: 0;
    }

    .certificate:before { top: -55px; right: -45px; }
    .certificate:after { bottom: -60px; left: -35px; }

    .cert-content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .cert-title {
      font-family: "Playfair Display", serif;
      font-size: 1.6rem;
      text-align: center;
      margin: 0;
      color: #0f3a53;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .cert-sub {
      text-align: center;
      margin: 4px 0 10px;
      font-size: 0.9rem;
      color: #334155;
      font-weight: 700;
    }

    .student-name {
      text-align: center;
      margin: 8px 0;
      font-size: 1.35rem;
      font-weight: 800;
      color: #0f172a;
      border-bottom: 2px solid #94a3b8;
      display: inline-block;
      padding: 2px 12px 5px;
      width: 100%;
    }

    .app-text {
      text-align: center;
      margin: 10px 0;
      font-size: 0.96rem;
      line-height: 1.45;
      color: #1e293b;
      white-space: pre-wrap;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
      margin-top: 10px;
      font-size: 0.86rem;
      color: #334155;
    }

    .meta-grid b { color: #0f172a; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 22px;
      font-weight: 600;
    }

    @page {
      size: A4;
      margin: 0;
    }

    @media print {
      body { padding: 0; background: #fff; }
      .head, .panel.controls-panel { display: none !important; }
      .print-sheet {
        width: 210mm;
        height: 297mm;
        margin: 0;
        padding: 6mm;
        box-shadow: none;
      }
    }

    @media (max-width: 980px) {
      .controls { grid-template-columns: 1fr; }
      .print-sheet { width: 100%; height: auto; min-height: auto; padding: 10px; }
      .certificate { min-height: 340px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="head">
      <div>
        <h1>Attendance Ceritficates</h1>
        <p>Generate appreciation certificates from monthly attendance with efficient 2-per-page A4 layout.</p>
      </div>
      <a href="dashboard.html">Back to Dashboard</a>
    </header>

    <section class="panel controls-panel">
      <div class="controls">
        <div>
          <label for="monthPicker">Month</label>
          <input id="monthPicker" type="month">
        </div>

        <div>
          <label for="classFilter">Class</label>
          <select id="classFilter">
            <option value="__ALL__">All Classes</option>
          </select>
        </div>

        <div>
          <label for="absentCriteria">Absent Days Eligible (comma list)</label>
          <input id="absentCriteria" type="text" value="0,1,2,3" placeholder="e.g. 0,1,2">
        </div>

        <div>
          <button id="generateBtn" type="button">Generate Certificates</button>
          <button type="button" onclick="window.print()" style="margin-left:6px; background:#334155; border-color:#334155;">Print</button>
        </div>
      </div>

      <div style="margin-top:10px;">
        <label for="templateText">Appreciation Template</label>
        <textarea id="templateText">This certificate is proudly presented to {NAME} for maintaining excellent attendance and discipline in {MONTH_LABEL}. Keep up the outstanding effort and continue shining in your studies.</textarea>
      </div>

      <div class="status" id="statusText">Ready.</div>
    </section>

    <div id="previewArea" class="empty">Generate certificates to preview here.</div>
  </div>

  <script src="auth.js"></script>
  <script src="Ceritficates.js"></script>
</body>
</html>
