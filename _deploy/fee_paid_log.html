<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahid School - Paid Fee Log</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="fee_paid_log.css">
</head>
<body>
    <div class="page-wrap">
        <header class="top-head">
            <div class="title-wrap">
                <div class="icon">💰</div>
                <div>
                    <h1>Paid Fee Log</h1>
                    <p>Date-wise challan payments with student details</p>
                </div>
            </div>
            <div class="head-links">
                <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="collect_fee.html"><i class="fas fa-hand-holding-usd"></i> Collect Fee</a>
            </div>
        </header>

        <section class="filters">
            <div class="field">
                <label for="feeDate">Select Date</label>
                <input type="date" id="feeDate">
            </div>
            <div class="field search-field">
                <label for="searchText">Search Student / Roll</label>
                <input type="text" id="searchText" placeholder="Type student name or roll number">
            </div>
            <div class="actions">
                <button id="loadBtn" class="btn-primary"><i class="fas fa-sync"></i> Load</button>
            </div>
        </section>

        <section class="summary" id="summaryBar">
            <div class="card">
                <span class="lbl">Rows</span>
                <strong id="rowCount">0</strong>
            </div>
            <div class="card">
                <span class="lbl">Total Amount</span>
                <strong id="totalAmount">Rs 0</strong>
            </div>
        </section>

        <section class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time (12h)</th>
                        <th>Roll No</th>
                        <th>Student Name</th>
                        <th>Class</th>
                        <th>Fee Head / Month</th>
                        <th>Challan No</th>
                        <th>Receipt No</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="paidLogBody">
                    <tr>
                        <td colspan="9" class="empty">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

    <script src="auth.js"></script>
    <script src="fee_paid_log.js"></script>
</body>
</html>
