<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework Publisher - Zahid School System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="homework.css">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="page-container" style="max-width: 1400px; margin: 0 auto;">
        <!-- Header -->
        <div class="header">
            <div>
                <h1 style="margin:0; color:#0f172a; font-size:2rem; font-weight:800;">📝 Homework Publisher</h1>
                <p style="margin:0.5rem 0 0 0; color:#64748b;">Select a category, then a class, and click the item buttons next to each student to lodge a complaint.</p>
            </div>
            <div class="header-nav">
                <a href="complaint_diary.html">📋 Complaint Diary</a>
                <a href="dashboard.html">📊 Dashboard</a>
            </div>
        </div>

        <!-- Category Tabs -->
        <div class="category-tabs" id="categoryTabsContainer">
            <!-- Dynamically populated by JS based on publisher_config -->
        </div>

        <!-- Controls -->
        <div class="controls-bar">
            <select id="classSelect">
                <option value="">-- Select Class --</option>
            </select>
            <div class="action-btns">
                <button class="btn-refresh" id="refreshStudents">🔄 Refresh</button>
                <button class="btn-select-all" id="selectAllBtn">☑ Select All</button>
                <button class="btn-clear" id="clearAllBtn">✕ Clear</button>
            </div>
            <span class="meta" id="studentCount">0 students</span>
        </div>

        <!-- Student List -->
        <div class="students-container" id="studentsContainer">
            <div class="empty-state">Select a class above to load students.</div>
        </div>

        <!-- Recent Entries -->
        <div class="recent-section">
            <h3 id="recentTitle">📋 Recent Homework Entries (Today)</h3>
            <div id="recentContainer">
                <div class="empty-state">No entries for today yet.</div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-box" id="toastContainer"></div>

    <script src="auth.js"></script>
    <script src="homework.js"></script>
</body>
</html>
