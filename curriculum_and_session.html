<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curriculum & Session - Zahid School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #d9e3f0;
      --text: #10233f;
      --muted: #5a6f8e;
      --brand: #1d4ed8;
      --brand2: #1e40af;
      --ok: #065f46;
      --err: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.10), transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.08), transparent 35%),
        var(--bg);
      min-height: 100vh;
      padding: 16px;
    }

    .wrap { max-width: 1200px; margin: 0 auto; }

    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 14px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 12px;
    }

    .head h1 { margin: 0; font-size: 1.18rem; }
    .head p { margin: 4px 0 0; color: var(--muted); font-size: 0.88rem; }
    .head a { color: var(--brand); text-decoration: none; font-weight: 700; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid #c4d2ea;
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      font-size: 0.9rem;
      color: var(--text);
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    .btn {
      border: 1px solid #c7d5ed;
      border-radius: 10px;
      padding: 8px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: #fff;
      color: #304863;
      min-height: 36px;
    }

    .btn.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .btn.primary:hover { background: var(--brand2); }

    .btn.danger {
      background: #fee2e2;
      border-color: #fca5a5;
      color: var(--err);
    }

    .btn.danger:hover {
      background: #fecaca;
    }

    .status {
      margin-top: 10px;
      font-size: 0.86rem;
      color: var(--ok);
      min-height: 18px;
      font-weight: 700;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: auto;
      max-height: 400px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }

    th {
      background: #f8fbff;
      font-weight: 700;
      color: var(--text);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    tr:hover { background: #f8fbff; }

    .action-btns {
      display: flex;
      gap: 6px;
    }

    .action-btns button {
      padding: 4px 8px;
      font-size: 0.75rem;
      min-height: auto;
    }

    .empty-msg {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 20px;
    }

    .curriculum-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .curriculum-header {
      background: #f8fbff;
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      color: var(--text);
      border-bottom: 1px solid var(--line);
    }

    .curriculum-header:hover {
      background: #ecf4ff;
    }

    .curriculum-header.expanded {
      background: #e0eeff;
    }

    .curriculum-caret {
      transition: transform 200ms ease;
      font-size: 0.8rem;
    }

    .curriculum-caret.open {
      transform: rotate(90deg);
    }

    .curriculum-content {
      display: none;
      padding: 12px 16px;
      background: #fff;
    }

    .curriculum-content.open {
      display: block;
    }

    .subject-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .subject-item {
      padding: 10px;
      background: #f8fbff;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }

    .subject-item strong {
      color: var(--brand);
    }

    .subject-item .empty-subj {
      color: var(--muted);
      font-size: 0.85rem;
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="head">
      <div>
        <h1>Curriculum & Session Manager</h1>
        <p>Add subjects/curricula and manage sessions for your school.</p>
      </div>
      <a href="dashboard.html">Back to Dashboard</a>
    </header>

    <section class="panel">
      <h2>Add Curriculum</h2>
      <form id="currForm">
        <div class="form-group">
          <label for="currName">Curriculum Name *</label>
          <input id="currName" type="text" placeholder="e.g., SSC, Cambridge, O'Levels" required>
        </div>
        <div class="form-group">
          <label for="currDesc">Description</label>
          <textarea id="currDesc" placeholder="Brief description (optional)"></textarea>
        </div>
        <button type="submit" class="btn primary">+ Add Curriculum</button>
        <div class="status" id="currStatus"></div>
      </form>
    </section>

    <section class="panel">
      <h2>Add Subject (Select Curriculum First)</h2>
      <form id="subjForm">
        <div class="form-group">
          <label for="subjCurr">Select Curriculum *</label>
          <select id="subjCurr" required>
            <option value="">-- Choose Curriculum --</option>
          </select>
        </div>
        <div class="form-group">
          <label for="subjName">Subject Name *</label>
          <input id="subjName" type="text" placeholder="e.g., Mathematics, English, Biology" required>
        </div>
        <div class="form-group">
          <label for="subjDesc">Description</label>
          <textarea id="subjDesc" placeholder="Brief description (optional)"></textarea>
        </div>
        <button type="submit" class="btn primary">+ Add Subject</button>
        <div class="status" id="subjStatus"></div>
      </form>
    </section>

    <section class="panel">
      <h2>Curricula & Subjects</h2>
      <div id="curriculaList" style="max-height: 600px; overflow-y: auto;">
        <div class="empty-msg">Loading curricula...</div>
      </div>
    </section>

    <section class="panel" style="margin-top: 12px;">
      <h2>Add Session</h2>
      <form id="sessForm" style="max-width: 400px;">
        <div class="form-group">
          <label for="sessValue">Session *</label>
          <input id="sessValue" type="text" placeholder="e.g., 2025-26" required>
        </div>
        <div class="form-group">
          <label for="sessDesc">Description</label>
          <textarea id="sessDesc" placeholder="e.g., Academic year details (optional)"></textarea>
        </div>
        <button type="submit" class="btn primary">+ Add Session</button>
        <div class="status" id="sessStatus"></div>
      </form>
    </section>

    <section class="panel" style="margin-top: 12px;">
      <h2>Sessions List</h2>
      <div class="table-wrap">
        <table id="sessTable">
          <thead>
            <tr>
              <th>Session</th>
              <th>Description</th>
              <th>Added On</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="sessBody">
            <tr><td colspan="4" class="empty-msg">Loading sessions...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="auth.js"></script>
  <script src="curriculum_and_session.js"></script>
</body>
</html>
